<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Find and Attack Warships</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body { 
  font-family: Arial; 
  text-align: center;

  background-image: url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1920&q=80");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  margin: 0;
  padding: 0;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    rgba(0, 40, 80, 0.6),
    rgba(0, 120, 180, 0.4)
  );
  z-index: -1;
}

.grid { 
  display: none;
  grid-template-columns: repeat(9, 40px); 
  gap: 4px; 
  justify-content: center; 
  margin: 20px auto; 
}

.cell {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(255,255,255,0.3);
  cursor: pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  transition: 0.2s;
}

.cell:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.2);
}

.hit { 
  background: rgba(255, 50, 50, 0.8);
  box-shadow: 0 0 10px red;
}

.miss { 
  background: rgba(50, 150, 255, 0.6);
}

#board {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 18px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<h2>🚢 Find and Attack Warships</h2>

<div>
  <input id="roomId" placeholder="Nhập Room ID">
  <button onclick="joinGame()">Tham gia</button>
</div>

<p id="status">Nhập Room ID để chơi</p>
<div id="board" class="grid"></div>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "warship-69e0c.firebaseapp.com",
  databaseURL: "https://warship-69e0c-default-rtdb.firebaseio.com",
  projectId: "warship-69e0c",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const COLS = 9;

let player = null;
let room = null;

let localBoard = Array(27).fill(0);
let enemyHits = [];
let myHits = [];

// ✅ THÊM: lưu ô bị đánh (chỉ mình thấy)
let attackedCells = [];

let placing = true;
let placingShip = 2;
let temp = [];

let joined = false;
let lastEventId = null;

// ===== DRAW =====
function drawBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  for (let i = 0; i < 27; i++) {
    let div = document.createElement("div");
    div.className = "cell";

    if (localBoard[i] > 0) div.innerText = localBoard[i];

    // ✅ THÊM: hiện X nếu bị đánh
    if (attackedCells.includes(i)) {
      div.innerText = "X";
      div.style.color = "yellow";
      div.style.fontSize = "18px";
    }

    if (enemyHits.includes(i)) div.classList.add("hit");
    if (myHits.includes(i)) div.classList.add("miss");

    div.onclick = () => clickCell(i);
    board.appendChild(div);
  }
}

// ===== JOIN =====
function joinGame() {
  room = document.getElementById("roomId").value.trim();
  if (!room) return alert("Nhập Room ID!");

  const ref = db.ref("rooms/" + room);

  ref.once("value", snap => {
    let data = snap.val();

    if (data && data.players >= 2) {
      ref.remove();
      data = null;
    }

    if (!data) {
      player = "A";
      ref.set({
        players: 1,
        phase: "waiting"
      });
    } 
    else if (data.players === 1) {
      player = "B";
      ref.update({
        players: 2,
        turn: "A",
        phase: "placing",
        readyA: false,
        readyB: false
      });
    }

    joined = true;
    listenGame();
  });
}

// ===== LISTEN =====
function listenGame() {
  db.ref("rooms/" + room).on("value", snap => {
    let data = snap.val();
    if (!data || !joined) return;

    if (data.event && data.event.id !== lastEventId) {
      lastEventId = data.event.id;

      const ev = data.event;

      if (ev.type === "sunk" && ev.owner === player) {
        alert("💀 Tàu " + ev.ship + " của bạn đã bị tiêu diệt!");
      }

      db.ref("rooms/" + room + "/event").remove();
    }

    if (data.ships && data.ships[player]) {
      localBoard = data.ships[player];
    }

    // ✅ THÊM: nhận ô bị đánh
    if (data.attacks && data.attacks[player]) {
      attackedCells = data.attacks[player];
    }

    drawBoard();

    if (data.players < 2) {
      statusText("Chờ người thứ 2...");
      document.getElementById("board").style.display = "none";
      return;
    }

    document.getElementById("board").style.display = "grid";

    if (data.winner) {
      statusText(data.winner === player ? "🎉 THẮNG!" : "💀 THUA!");

      setTimeout(() => {
        alert("Game kết thúc!");

        if (player === "A") {
          db.ref("rooms/" + room).remove();
        }

        resetGame();
      }, 2000);

      return;
    }

    if (data.phase === "placing") {

      if (placing) {
        statusText(placingShip === 2 ? "👉 Đặt tàu 2 ô" : "👉 Đặt tàu 3 ô");
      } else {
        statusText("Chờ đối phương...");
      }

      if (data.readyA && data.readyB) {
        db.ref("rooms/" + room).update({
          phase: "battle",
          turn: "A"
        });
      }

      return;
    }

    if (data.phase === "battle") {
      placing = false;
      statusText("Lượt: " + data.turn);
    }
  });
}

function statusText(t){
  document.getElementById("status").innerText = t;
}

// ===== CLICK =====
function clickCell(i) {
  if (!joined) return;

  if (placing) {
    temp.push(i);

    if (temp.length === placingShip) {
      if (valid(temp, placingShip)) {
        temp.forEach(x => localBoard[x] = placingShip);
        temp = [];

        if (placingShip === 2) {
          placingShip = 3;
          statusText("👉 Đặt tàu 3");
        } else {
          placing = false;
          saveShips();
        }
      } else {
        alert("Sai vị trí!");
        temp = [];
      }
    }
  } else {
    if (enemyHits.includes(i) || myHits.includes(i)) return;
    attack(i);
  }

  drawBoard();
}

// ===== ATTACK =====
function attack(i) {
  const ref = db.ref("rooms/" + room);

  ref.once("value", snap => {
    let data = snap.val();

    if (data.phase !== "battle") return;
    if (data.turn !== player) return;

    let enemy = player === "A" ? "B" : "A";
    let enemyBoard = data.ships?.[enemy] || [];

    if (enemyBoard[i] > 0) {
      alert("🎯 TRÚNG!");
      enemyHits.push(i);
    } else {
      alert("💦 Trượt");
      myHits.push(i);
    }

    // ✅ THÊM: ghi ô bị đánh cho đối phương
    let enemyAttacks = data.attacks?.[enemy] || [];
    if (!enemyAttacks.includes(i)) enemyAttacks.push(i);

    ref.update({
      ["ships/" + enemy]: enemyBoard,
      ["attacks/" + enemy]: enemyAttacks,
      turn: enemy
    });
  });
}
