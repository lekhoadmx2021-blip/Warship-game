<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Find and Attack Warships</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body { 
  font-family: Arial; 
  text-align: center;
  background-image: url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1920&q=80");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  margin: 0;
  padding: 0;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(rgba(0,40,80,0.6), rgba(0,120,180,0.4));
  z-index: -1;
}

.grid { 
  display: none;
  grid-template-columns: repeat(9, 40px); 
  gap: 4px; 
  justify-content: center; 
  margin: 20px auto; 
}

.cell {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(255,255,255,0.3);
  cursor: pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}

.cell:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.2);
}

.hit { background: rgba(255,50,50,0.8); }
.miss { background: rgba(50,150,255,0.6); }

#board {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 18px;
}

button {
  padding: 6px 12px;
  border-radius: 8px;
  border: 2px solid #00d4ff;
  background: rgba(0,150,255,0.2);
  color: white;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background: rgba(0,150,255,0.5);
}
</style>
</head>

<body>

<h2>🚢 Find and Attack Warships</h2>

<div>
  <input id="roomId" placeholder="Nhập Room ID">
  <button onclick="joinGame()">Tham gia</button>
  <button onclick="toggleRadar()">🔍 Radar</button>
</div>

<p id="status">Nhập Room ID để chơi</p>
<div id="board" class="grid"></div>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "warship-69e0c.firebaseapp.com",
  databaseURL: "https://warship-69e0c-default-rtdb.firebaseio.com",
  projectId: "warship-69e0c",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const COLS = 9;

let player = null;
let room = null;

let localBoard = Array(27).fill(0);
let enemyHits = [];
let myHits = [];

let joined = false;

// ===== RADAR =====
let radarMode = false;
let radarTemp = [];
let radarUsed = 0;
const RADAR_LIMIT = 2;

// ===== DRAW =====
function drawBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  for (let i = 0; i < 27; i++) {
    let div = document.createElement("div");
    div.className = "cell";

    if (enemyHits.includes(i)) div.classList.add("hit");
    if (myHits.includes(i)) div.classList.add("miss");

    div.onclick = () => clickCell(i);
    board.appendChild(div);
  }
}

// ===== JOIN =====
function joinGame() {
  room = document.getElementById("roomId").value.trim();
  if (!room) return alert("Nhập Room ID!");

  const ref = db.ref("rooms/" + room);

  ref.once("value", snap => {
    let data = snap.val();

    if (!data) {
      player = "A";
      ref.set({ players: 1 });
    } else {
      player = "B";
      ref.update({ players: 2, turn: "A" });
    }

    joined = true;
    listenGame();
  });
}

// ===== LISTEN =====
function listenGame() {
  db.ref("rooms/" + room).on("value", snap => {
    let data = snap.val();
    if (!data || !joined) return;

    drawBoard();

    if (data.players < 2) {
      statusText("⏳ Đang chờ người chơi thứ 2...");
      return;
    }

    statusText("Lượt: " + data.turn);
  });
}

function statusText(t){
  document.getElementById("status").innerText = t;
}

// ===== RADAR TOGGLE =====
function toggleRadar() {
  if (radarUsed >= RADAR_LIMIT) {
    alert("Hết lượt Radar!");
    return;
  }

  radarMode = !radarMode;
  radarTemp = [];

  if (radarMode) {
    statusText("🔍 Radar bật: chọn 6 ô");
  } else {
    statusText("❌ Radar tắt");
  }
}

// ===== CLICK =====
function clickCell(i) {
  if (!joined) return;

  if (radarMode) {
    if (radarTemp.includes(i)) return;

    radarTemp.push(i);

    if (radarTemp.length === 6) {
      if (validRadar(radarTemp)) {
        checkRadar(radarTemp);
      } else {
        alert("❌ Sai vùng radar!");
      }

      radarTemp = [];
      radarMode = false;
    }
    return;
  }

  attack(i);
}

// ===== RADAR VALID =====
function validRadar(arr) {
  let r = arr.map(i => Math.floor(i / COLS));
  let c = arr.map(i => i % COLS);

  let h = Math.max(...r) - Math.min(...r) + 1;
  let w = Math.max(...c) - Math.min(...c) + 1;

  return (h === 2 && w === 3) || (h === 3 && w === 2);
}

// ===== CHECK RADAR =====
function checkRadar(arr) {
  const ref = db.ref("rooms/" + room);

  ref.once("value", snap => {
    let data = snap.val();
    let enemy = player === "A" ? "B" : "A";
    let enemyBoard = data.ships?.[enemy] || [];

    let found = arr.some(i => enemyBoard[i] > 0);

    radarUsed++;

    alert(found ? "📡 CÓ tàu!" : "📡 KHÔNG có tàu!");
  });
}

// ===== ATTACK =====
function attack(i) {
  alert("💥 Bắn vào ô " + i);
}

drawBoard();
</script>

</body>
</html>
